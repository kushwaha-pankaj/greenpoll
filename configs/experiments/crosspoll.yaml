project:
  name: crosspoll
  task: detect
  model: yolov8n.pt

data:
  train_crops: [tomato, strawberry, apple]
  heldout_crop: kiwi
  label_budgets: [10, 25, 50, 100, 181]

training:
  epochs: 150
  patience: 15
  imgsz: 640
  batch: 16
  optimizer: AdamW
  amp: true
  cache: "ram"
  cos_lr: true
  workers: 4
  deterministic: false
  plots: false
  lr0_joint: 0.001
  lr0_finetune: 0.0001
  device: "mps"

evaluation:
  primary_metric: mAP50
  secondary_metrics: [precision, recall, f1]

reproducibility:
  seeds: [42, 43, 44]
  log_registry: experiments/registry.csv
  log_results: results/summary.csv
